name: CI

on:
  push:
    branches: [main, development]
  pull_request:

jobs:
  quality:
    name: Lint, typecheck, unit tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup
        uses: ./.github/actions/setup

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit and component tests
        run: pnpm test

  e2e:
    name: End-to-end tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup
        uses: ./.github/actions/setup

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium firefox

      # playwright.config.ts builds and serves the app itself (webServer:
      # "pnpm build && pnpm preview") and branches on process.env.CI.
      - name: Run e2e tests
        run: pnpm test:e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  a11y:
    name: Accessibility audit (axe, reduced matrix)
    runs-on: ubuntu-latest
    # Backstop for a hung server/browser — the full reduced matrix takes ~8 min.
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup
        uses: ./.github/actions/setup

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      # The preview server must NOT inherit the step's stdio: the runner keeps
      # a step alive until its stdout/stderr pipes close, so a bare `… &`
      # hangs the job forever (it burned the 6h cap on its first run).
      - name: Build and serve
        run: |
          pnpm build
          nohup pnpm preview > preview.log 2>&1 &
          npx wait-on http://localhost:4173 --timeout 60000

      # Reduced matrix: every theme x contrast mode with the default accent,
      # plus the worst-case accent (blue, the base scale) in light/normal.
      # The full 24-mode accent sweep stays a manual act: pnpm audit:a11y --accent all
      - name: Audit (themes x contrasts, default accent)
        run: pnpm audit:a11y --url http://localhost:4173/ --theme both --contrast both --accent default --json a11y-results.json

      - name: Audit (worst-case accent spot check)
        run: pnpm audit:a11y --url http://localhost:4173/ --theme light --contrast normal --accent blue --json a11y-results-blue.json

      - name: Upload audit results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: a11y-audit-results
          path: a11y-results*.json
          retention-days: 7
