name: Deploy to GitHub Pages

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# One Pages deployment at a time; never cancel an in-flight production deploy.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  gate:
    name: E2E gate (chromium)
    runs-on: ubuntu-latest
    steps:
      # On `release: published` this checks out the released tag's commit;
      # on workflow_dispatch, the selected ref.
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup
        uses: ./.github/actions/setup

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      # Pages is production and the PWA pushes updates to every installed
      # client — a fast chromium-only gate blocks broken deploys.
      - name: Run e2e tests (chromium)
        run: pnpm test:e2e --project=chromium

  deploy:
    name: Build and deploy
    needs: gate
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup
        uses: ./.github/actions/setup

      # Repo-name-agnostic base path: project pages get /<repo-name>/;
      # set a repository variable BASE_PATH (e.g. "/") for custom domains.
      - name: Build
        run: pnpm build
        env:
          BASE_PATH: ${{ vars.BASE_PATH || format('/{0}/', github.event.repository.name) }}

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
